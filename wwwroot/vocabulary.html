<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Quản Lý Từ Vựng - Học Tiếng Anh</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=2">
    <link rel="stylesheet" href="vocabulary.css">
</head>
<body>
    <!-- Header Navigation -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <h1>📚 Học Từ Vựng</h1>
                    <span class="tagline">Nâng Cao Kỹ Năng Tiếng Anh</span>
                </div>
                <nav class="nav">
                    <a href="index.html" class="nav-link">Trang Chủ</a>
                    <a href="vocabulary.html" class="nav-link active">Từ Vựng</a>
                    <a href="quiz.html" class="nav-link">Trắc Nghiệm</a>
                    <a href="passage.html" class="nav-link">Điền Chỗ Trống</a>
                </nav>
            </div>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <!-- Vocabulary Management Section -->
            <section class="vocabulary-management">
                <div class="section-header">
                    <h2>Quản Lý Từ Vựng</h2>
                    <button class="btn btn-primary" onclick="openAddModal()">+ Thêm Từ Mới</button>
                </div>

                <!-- Search and Filter -->
                <div class="controls">
                    <input type="text" id="searchInput" class="search-box" placeholder="🔍 Tìm kiếm từ vựng...">
                </div>

                <!-- Vocabulary List -->
                <div class="vocabulary-list" id="vocabularyList"></div>
            </section>
        </div>
    </main>

    <!-- Add/Edit Modal -->
    <div id="vocabularyModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Thêm Từ Vựng Mới</h2>
                <button class="close" onclick="closeModal()">&times;</button>
            </div>
            <form id="vocabularyForm" onsubmit="saveVocabulary(event)">
                <div class="form-group">
                    <label for="englishWord">Từ Tiếng Anh:</label>
                    <input type="text" id="englishWord" required placeholder="Nhập từ tiếng Anh">
                </div>

                <div class="form-group">
                    <label for="vietnameseMeaning">Nghĩa Tiếng Việt:</label>
                    <input type="text" id="vietnameseMeaning" required placeholder="Nhập nghĩa tiếng Việt">
                </div>

                <div class="form-group">
                    <label for="wordType">Loại Từ:</label>
                    <select id="wordType">
                        <option value="">Chọn loại từ</option>
                        <option value="Danh từ">Danh từ (Noun)</option>
                        <option value="Động từ">Động từ (Verb)</option>
                        <option value="Tính từ">Tính từ (Adjective)</option>
                        <option value="Trạng từ">Trạng từ (Adverb)</option>
                        <option value="Khác">Khác</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="example">Ví Dụ Tiếng Anh:</label>
                    <textarea id="example" rows="3" placeholder="Nhập câu ví dụ tiếng Anh"></textarea>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Lưu</button>
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Hủy</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 Học Từ Vựng. Tất cả quyền được bảo lưu.</p>
        </div>
    </footer>

    <script src="vocabulary-manager.js"></script>
</body>
</html>
